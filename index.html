<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southern Africa — 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold:         #B8975A;
  --gold-light:   #D4B483;
  --dark:         #1A1A18;
  --cream:        #F7F3ED;
  --warm-gray:    #6B6560;
  --border:       #D9D0C4;
  --accent-green: #3D5A47;
}
html, body { height: 100%; background: var(--dark); font-family: 'Montserrat', sans-serif; color: var(--cream); }
body {
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  background-image: radial-gradient(ellipse at 70% 80%, rgba(184,151,90,0.18) 0%, transparent 60%),
                    radial-gradient(ellipse at 20% 30%, rgba(61,90,71,0.22) 0%, transparent 55%);
}
.login-box { width: 100%; max-width: 420px; padding: 52px 48px 44px; text-align: center; }
.login-label { font-size: 7.5pt; letter-spacing: 4px; text-transform: uppercase; color: var(--gold-light); margin-bottom: 18px; }
.login-title { font-family: 'Cormorant Garamond', serif; font-size: 36pt; font-weight: 300; line-height: 1.1; margin-bottom: 6px; }
.login-title em { font-style: italic; color: var(--gold-light); }
.login-subtitle { font-family: 'Cormorant Garamond', serif; font-size: 13pt; font-weight: 300; color: rgba(247,243,237,0.5); margin-bottom: 40px; }
.login-divider { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 36px; }
.login-form input[type="password"] {
  width: 100%; padding: 13px 18px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(217,208,196,0.3);
  color: var(--cream); font-family: 'Montserrat', sans-serif; font-size: 10pt;
  letter-spacing: 3px; text-align: center; outline: none; transition: border-color 0.2s;
  border-radius: 2px; margin-bottom: 14px;
}
.login-form input[type="password"]:focus { border-color: var(--gold); }
.login-form input[type="password"]::placeholder { letter-spacing: 2px; color: rgba(247,243,237,0.28); }
.login-form button {
  width: 100%; padding: 13px; background: var(--gold); border: none;
  color: var(--dark); font-family: 'Montserrat', sans-serif; font-size: 8pt;
  font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
  border-radius: 2px; transition: background 0.2s;
}
.login-form button:hover { background: var(--gold-light); }
.login-error { margin-top: 14px; font-size: 8pt; letter-spacing: 1.5px; color: #E07070; min-height: 18px; opacity: 0; transition: opacity 0.2s; }
.login-error.visible { opacity: 1; }
.login-footer { margin-top: 48px; font-size: 7pt; letter-spacing: 2px; text-transform: uppercase; color: rgba(247,243,237,0.18); }

/* Savanna SVG cover strip */
.login-cover {
  width: 100%;
  max-width: 420px;
  margin: 0 auto 32px;
  height: 90px;
  overflow: hidden;
  border-radius: 2px;
}
</style>
</head>
<body>
<div class="login-box">

  <!-- Savanna silhouette strip -->
  <div class="login-cover">
    <svg viewBox="0 0 420 90" xmlns="http://www.w3.org/2000/svg" width="420" height="90">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1A1A18"/>
          <stop offset="55%" stop-color="#4A2C0A"/>
          <stop offset="100%" stop-color="#B8975A"/>
        </linearGradient>
      </defs>
      <!-- Sky -->
      <rect width="420" height="90" fill="url(#sky)"/>
      <!-- Sun -->
      <circle cx="310" cy="52" r="16" fill="#D4B483" opacity="0.6"/>
      <!-- Ground -->
      <rect x="0" y="72" width="420" height="18" fill="#1A1A18"/>
      <!-- Acacia tree 1 -->
      <rect x="58" y="48" width="4" height="24" fill="#1A1A18"/>
      <ellipse cx="60" cy="46" rx="22" ry="10" fill="#1A1A18"/>
      <!-- Acacia tree 2 -->
      <rect x="148" y="54" width="3" height="18" fill="#1A1A18"/>
      <ellipse cx="149" cy="52" rx="16" ry="8" fill="#1A1A18"/>
      <!-- Acacia tree 3 -->
      <rect x="348" y="44" width="4" height="28" fill="#1A1A18"/>
      <ellipse cx="350" cy="42" rx="24" ry="11" fill="#1A1A18"/>
      <!-- Giraffe silhouette -->
      <g fill="#1A1A18">
        <rect x="230" y="30" width="5" height="30" rx="2"/>  <!-- neck -->
        <rect x="228" y="26" width="9" height="7" rx="2"/>   <!-- head -->
        <rect x="232" y="23" width="2" height="5" rx="1"/>   <!-- horn -->
        <rect x="224" y="56" width="4" height="16" rx="1"/>  <!-- legs -->
        <rect x="232" y="56" width="4" height="16" rx="1"/>
        <ellipse cx="228" cy="57" rx="8" ry="5"/>            <!-- body -->
      </g>
    </svg>
  </div>

  <div class="login-label">Private Travel Document</div>
  <div class="login-title">Southern <em>Africa</em></div>
  <div class="login-subtitle">September 2026</div>
  <div class="login-divider"></div>
  <div class="login-form">
    <input type="password" id="pw" placeholder="Enter passphrase" autocomplete="off" autofocus>
    <button onclick="checkPassword()">Enter</button>
    <div class="login-error" id="err">Incorrect passphrase — please try again</div>
  </div>
  <div class="login-footer">Vincent Shine &amp; Debbie Rez</div>
</div>
<script>
var HASH = '31831ae38207c55d431c52aec3899b2321d582366f871c58467e9b94da993d05';
async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function checkPassword() {
  var input = document.getElementById('pw').value;
  var hash = await sha256(input);
  if (hash === HASH) {
    sessionStorage.setItem('sa2026_auth', '1');
    window.location.href = 'trip/viewer.html';
  } else {
    var err = document.getElementById('err');
    err.classList.add('visible');
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
    setTimeout(function() { err.classList.remove('visible'); }, 3000);
  }
}
document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPassword();
});
</script>
</body>
</html>
