<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southern Africa Itinerary — Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-family: 'Montserrat', -apple-system, sans-serif;
  }

  /* ── Status bar ────────────────────────────────── */
  #status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 18px;
    font-size: 7.5pt;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #status-bar.ok      { background: #3D5A47; color: #F7F3ED; }
  #status-bar.loading { background: #1A1A18; color: #B8975A; }
  #status-bar.warn    { background: #7a3500; color: #fff; }
  #status-bar.error   { background: #6B0000; color: #fff; }
  #status-bar .bar-left  { display: flex; align-items: center; gap: 10px; }
  #status-bar .bar-right { display: flex; align-items: center; gap: 12px; }
  #status-bar button {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: inherit;
    padding: 2px 10px;
    font-size: 7pt;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
  }
  #status-bar button:hover { background: rgba(255,255,255,0.28); }

  /* ── Content frame ─────────────────────────────── */
  #content-frame {
    flex: 1;
    border: none;
    width: 100%;
  }

  /* ── Not-found message ─────────────────────────── */
  #not-found {
    display: none;
    flex: 1;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: #6B6560;
    font-size: 9pt;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: #F7F3ED;
  }
  #not-found p {
    max-width: 420px;
    text-align: center;
    line-height: 1.8;
  }
  #not-found code {
    background: #fff;
    border: 1px solid #D9D0C4;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 8.5pt;
    letter-spacing: 0;
    text-transform: none;
  }

  @media print {
    #status-bar { display: none; }
    #content-frame { height: 100vh; }
  }
</style>
</head>
<body>

<!-- ══ STATUS BAR ══════════════════════════════════════════════ -->
<div id="status-bar" class="loading">
  <div class="bar-left"><span id="bar-msg">Connecting to Google Drive…</span></div>
  <div class="bar-right">
    <span id="bar-time"></span>
    <button onclick="manualRefresh()">↻ Refresh Now</button>
  </div>
</div>

<!-- ══ CONTENT IFRAME ══════════════════════════════════════════ -->
<iframe id="content-frame"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
        title="Itinerary content"></iframe>

<!-- ══ NOT-FOUND MESSAGE ══════════════════════════════════════ -->
<div id="not-found">
  <p>Upload <code>itinerary.html</code> to your Google Drive folder to get started.<br>
     The page will load and refresh automatically whenever that file is updated.</p>
  <p>Photos: drop images named after destinations into the same folder —<br>
     e.g. <code>cape-town.jpg</code>, <code>zambezi.jpg</code>, <code>bomani.jpg</code></p>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIGURATION
// ══════════════════════════════════════════════════════════════
const CONFIG = {
  DRIVE_FOLDER_ID  : '1jVXmpDT5TmZ99Q05ArA-CbnWpUAqjAeT',
  GOOGLE_API_KEY   : 'AIzaSyBZndrLXYsyBMIy8hwKblnWImaQ6pcLsQw',
  CONTENT_FILENAME : 'itinerary.html',
  REFRESH_MINUTES  : 5,
  BANNER_KEYWORDS  : {
    departure    : ['departure', 'chicago', 'ord'],
    johannesburg : ['johannesburg', 'joburg', 'jnb', 'rosebank', 'hyde'],
    zambezi      : ['zambezi', 'chobe', 'botswana', 'kasane', 'houseboat'],
    victoria     : ['victoria', 'falls', 'pioneers'],
    bomani       : ['bomani', 'hwange', 'ngamo'],
    capetown     : ['cape', 'capetown', 'gorgeous', 'george', 'table'],
    return       : ['return', 'home', 'homeward']
  }
};

// ══════════════════════════════════════════════════════════════
// DRIVE API
// ══════════════════════════════════════════════════════════════
async function listDriveFiles() {
  const q      = `'${CONFIG.DRIVE_FOLDER_ID}' in parents and trashed = false`;
  const fields = 'files(id,name,mimeType,modifiedTime)';
  const url    = `https://www.googleapis.com/drive/v3/files`
               + `?q=${encodeURIComponent(q)}`
               + `&fields=${encodeURIComponent(fields)}`
               + `&pageSize=100`
               + `&key=${CONFIG.GOOGLE_API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) {
    const body = await r.json().catch(() => ({}));
    throw new Error(body.error?.message || `HTTP ${r.status}`);
  }
  return (await r.json()).files || [];
}

async function fetchText(fileId) {
  const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${CONFIG.GOOGLE_API_KEY}`;
  const r   = await fetch(url);
  if (!r.ok) throw new Error(`Could not read file (HTTP ${r.status})`);
  return r.text();
}

function driveImageUrl(fileId) {
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1400-h400-c`;
}

// ══════════════════════════════════════════════════════════════
// CSS INJECTION
// Injects viewer-specific CSS to ensure consistent padding and
// layout regardless of which itinerary version is in Drive.
// ══════════════════════════════════════════════════════════════
const VIEWER_CSS = `
  /* ── Viewer layout overrides ── */
  body {
    padding: 0 !important;
  }
  .overview {
    padding-left: 50px !important;
    padding-right: 50px !important;
  }
  .days-section {
    padding-left: 50px !important;
    padding-right: 50px !important;
  }
  .todo-section {
    padding-left: 50px !important;
    padding-right: 50px !important;
  }
  /* Photo banners stay full-bleed */
  .photo-banner,
  .cover {
    margin-left: 0 !important;
    width: 100% !important;
  }
`;

// ══════════════════════════════════════════════════════════════
// IMAGE + CSS INJECTION
// ══════════════════════════════════════════════════════════════
function injectImages(htmlText, files) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(htmlText, 'text/html');

  // Inject viewer CSS overrides
  const styleEl = doc.createElement('style');
  styleEl.id    = 'viewer-overrides';
  styleEl.textContent = VIEWER_CSS;
  doc.head.appendChild(styleEl);

  // Inject Drive images into banner elements
  for (const [bannerId, keywords] of Object.entries(CONFIG.BANNER_KEYWORDS)) {
    const imgFile = files.find(f =>
      f.mimeType.startsWith('image/') &&
      keywords.some(kw => f.name.toLowerCase().includes(kw))
    );
    if (!imgFile) continue;
    const el = doc.getElementById(`banner-${bannerId}`);
    if (el) {
      el.style.backgroundImage = `url('${driveImageUrl(imgFile.id)}')`;
    }
  }

  return '<!DOCTYPE html>' + doc.documentElement.outerHTML;
}

// ══════════════════════════════════════════════════════════════
// STATUS BAR
// ══════════════════════════════════════════════════════════════
function setBar(msg, state) {
  const bar = document.getElementById('status-bar');
  const txt = document.getElementById('bar-msg');
  const ts  = document.getElementById('bar-time');
  bar.className    = state;
  txt.textContent  = msg;
  ts.textContent   = state === 'ok'
    ? `Last updated ${new Date().toLocaleTimeString()}`
    : '';
}

// ══════════════════════════════════════════════════════════════
// MAIN REFRESH LOOP
// ══════════════════════════════════════════════════════════════
let lastModifiedTime = null;
let currentBlobUrl   = null;

async function refresh() {
  setBar('⟳ Checking Google Drive for updates…', 'loading');
  try {
    const files = await listDriveFiles();

    // Find itinerary.html in the folder
    const htmlFile = files.find(f => f.name === CONFIG.CONTENT_FILENAME);
    if (!htmlFile) {
      setBar(`⚠ Upload "${CONFIG.CONTENT_FILENAME}" to your Drive folder to get started`, 'warn');
      document.getElementById('content-frame').style.display = 'none';
      document.getElementById('not-found').style.display = 'flex';
      return;
    }

    // Skip if nothing has changed
    if (htmlFile.modifiedTime === lastModifiedTime) {
      setBar('✓ Up to date', 'ok');
      return;
    }

    // Fetch the HTML content
    const rawHtml  = await fetchText(htmlFile.id);

    // Inject viewer CSS + Drive images into banner elements
    const finalHtml = injectImages(rawHtml, files);

    // Render in iframe via a Blob URL
    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
    const blob       = new Blob([finalHtml], { type: 'text/html' });
    currentBlobUrl   = URL.createObjectURL(blob);
    const frame      = document.getElementById('content-frame');
    frame.src        = currentBlobUrl;
    frame.style.display = 'block';
    document.getElementById('not-found').style.display = 'none';
    lastModifiedTime = htmlFile.modifiedTime;
    setBar('✓ Itinerary loaded from Google Drive', 'ok');

  } catch (err) {
    console.error('[Drive viewer]', err);
    if (currentBlobUrl) {
      setBar(`⚠ Drive unreachable (${err.message}) — showing last version`, 'warn');
    } else {
      setBar(`✗ Could not reach Drive: ${err.message}`, 'error');
    }
  }
}

function manualRefresh() {
  lastModifiedTime = null;
  refresh();
}

// ── Boot ──────────────────────────────────────────────────────
refresh();
setInterval(refresh, CONFIG.REFRESH_MINUTES * 60 * 1000);
</script>
</body>
</html>
